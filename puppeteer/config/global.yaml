api_keys:
  openai_api_key: 'sk-dummy' # openai api key
  openai_base_url: "http://localhost:8001/v1" # openai base url, e.g., https://api.openai.com/v1/
  tavily_api_key: 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 # tavily api key for web search

